<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanchanaburi History & Tourism Game</title>
  <link rel="stylesheet" href="style.css?v=1.4">
</head>
<body>
  <!-- Setup Screen -->
  <div id="setup-screen" class="screen active setup-container">
    <div class="glass-panel" style="text-align: center; width: 450px;">
      <h1>Kanchanaburi History & Tourism</h1>
      <p>Scan to Join the Game</p>
      
      <div class="setup-group">
        <label>Game Time (Minutes):</label>
        <input type="number" id="time-input" value="15" min="5" max="60" class="input-field" style="max-width: 150px; margin: 0 auto;">
      </div>
      
      <div id="qrcode-container" style="display: flex; justify-content: center; background: white; padding: 20px; border-radius: 12px; width: max-content; margin: 20px auto;">
        <!-- QR Code will go here -->
      </div>
      <p id="join-url" style="font-family: monospace; font-size: 1.1rem; color: var(--accent-color);"></p>
      
      <div class="setup-group">
        <label>Connected Players (<span id="connected-count">0</span>):</label>
        <div id="connected-players-list" style="min-height: 50px; max-height: 150px; overflow-y: auto; text-align: left; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px;">
          <!-- Names will appear here -->
        </div>
      </div>
      
      <button id="start-game-btn" class="btn primary-btn" style="width: 100%; margin-top: 20px;" onclick="startGame()" disabled>Start Game (Waiting...)</button>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="game-screen" class="screen">
    <header class="game-header">
      <div style="display: flex; gap: 15px; align-items: center;">
        <div class="timer" id="timer-display">15:00</div>
        <button id="pause-btn" class="btn secondary-btn">Pause</button>
        <button id="quit-btn" class="btn secondary-btn" style="background: rgba(255, 107, 107, 0.5); border-color: transparent;" onclick="quitGame()">Quit</button>
      </div>
      <div class="turn-indicator" id="turn-indicator">Player 1's Turn</div>
    </header>
    
    <div class="game-container">
      <div class="board-container">
        <div id="board" class="board">
          <!-- Squares generated by JS -->
        </div>
        
        <!-- Center of board controls -->
        <div class="board-center">
          <div class="action-container glass-panel" style="text-align: center;">
            <div id="dice" class="dice" style="margin: 0 auto 20px;">🎲</div>
            <h2 id="action-text">Waiting for Player 1 to roll...</h2>
          </div>
        </div>
      </div>
      
      <div class="sidebar">
        <h2>Players</h2>
        <div id="players-list" class="players-list">
          <!-- Player cards generated by JS -->
        </div>
      </div>
    </div>
  </div>

  <!-- Modals -->
  <div id="modal-overlay" class="modal-overlay">
    <!-- Question Modal -->
    <div id="question-modal" class="modal glass-panel">
      <h2 id="q-title">Question</h2>
      <div id="q-image-container" class="image-container" style="display: none;">
        <img id="q-image" src="" alt="Kanchanaburi Location">
      </div>
      <p id="q-text" class="question-text"></p>
      <div id="q-options" class="options-container">
        <!-- Buttons injected by JS -->
      </div>
    </div>

    <!-- Random Bonus Modal -->
    <div id="bonus-modal" class="modal glass-panel">
      <h2>Lucky Door!</h2>
      <p id="bonus-text" class="bonus-text"></p>
    </div>

    <!-- Game Over Modal -->
    <div id="gameover-modal" class="modal glass-panel">
      <h2>Time's Up!</h2>
      <div id="final-scores" class="final-scores"></div>
      <button id="restart-btn" class="btn primary-btn" onclick="restartGame()">Play Again</button>
    </div>
  </div>

  <!-- Announcement Animation Overlay -->
  <div id="announcement" class="announcement">
    <h1 id="announce-title">Correct!</h1>
    <p id="announce-subtitle">+100 ฿</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="data.js?v=1.4"></script>
  <script src="app.js?v=1.4"></script>
</body>
</html>
